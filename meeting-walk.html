<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До встречи!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #faf9f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #2c2416;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(180, 160, 140, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(160, 140, 120, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200, 180, 150, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 32px;
            padding: 56px 40px;
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.02),
                0 4px 16px rgba(0, 0, 0, 0.03),
                0 12px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
            animation: cardReveal 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .ornament::before,
        .ornament::after {
            content: '';
            width: 48px;
            height: 1px;
            background: #d4c8b8;
            opacity: 0.6;
        }

        .ornament-dot {
            width: 4px;
            height: 4px;
            background: #b8a58e;
            border-radius: 50%;
            opacity: 0.6;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 28px;
            display: block;
            line-height: 1;
            animation: iconPop 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s both;
        }

        @keyframes iconPop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 500;
            font-size: 2.4rem;
            color: #2c2416;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
            animation: fadeUp 0.7s ease 0.2s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time-box {
            display: inline-block;
            padding: 14px 28px;
            background: #f9f6f0;
            border: 1px solid #e5ddd0;
            border-radius: 40px;
            color: #5a4a38;
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 24px;
            animation: fadeUp 0.7s ease 0.35s both;
        }

        .status {
            font-size: 0.85rem;
            color: #8b9b7e;
            font-style: italic;
            animation: fadeUp 0.7s ease 0.5s both;
        }

        .manual-btn {
            display: none;
            background: none;
            border: 1px solid #d4c8b8;
            color: #5a4a38;
            padding: 10px 28px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .manual-btn:hover {
            background: rgba(180, 150, 120, 0.06);
            border-color: #b8a58e;
        }

        .footer-text {
            margin-top: 36px;
            font-size: 0.8rem;
            color: #c4b9a8;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeUp 0.7s ease 0.6s both;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ornament">
            <span class="ornament-dot"></span>
        </div>
        <span class="icon">🌳</span>
        <div class="title">До встречи!</div>
        <div class="time-box" id="timeDisplay"></div>
        <div class="status" id="status">Уведомление отправлено</div>
        <button class="manual-btn" id="manualBtn">Отправить вручную</button>
        <div class="footer-text">Осень 2024</div>
    </div>

    <form class="hidden" id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Время прогулки выбрано">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" class="hidden"></iframe>

    <script>
        var params = new URLSearchParams(window.location.search);
        var time = params.get('time');
        var display = document.getElementById('timeDisplay');

        if (time) {
            display.textContent = '🕐 ' + decodeURIComponent(time);
        } else {
            display.textContent = 'Время не указано';
        }

        document.getElementById('formTime').value = time || '';
        document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
        document.getElementById('formMessage').value = 'Время: "' + (time || '') + '"\nДата: ' + new Date().toLocaleString('ru-RU');

        var form = document.getElementById('emailForm');
        form.target = 'hiddenFrame';
        var sent = false;

        function sendForm() {
            if (sent) return;
            sent = true;
            form.submit();
            document.getElementById('status').textContent = 'Отправлено';
            document.getElementById('manualBtn').style.display = 'none';
        }

        setTimeout(function() {
            sendForm();
            setTimeout(function() {
                if (!sent) {
                    document.getElementById('status').textContent = 'Не отправилось автоматически';
                    document.getElementById('manualBtn').style.display = 'inline-block';
                }
            }, 3000);
        }, 600);

        document.getElementById('manualBtn').addEventListener('click', sendForm);
    </script>
</body>
</html>
