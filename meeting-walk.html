<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До встречи!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: rgba(25, 25, 45, 0.95);
            border-radius: 24px;
            padding: 35px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(255, 140, 0, 0.2);
            border: 2px solid rgba(255, 140, 0, 0.5);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,140,0,0.08) 0%, transparent 60%);
            animation: rotate 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .icon {
            font-size: 55px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255,140,0,0.6));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .meeting-text {
            color: white;
            font-size: 2em;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(255,140,0,0.5);
            font-weight: bold;
        }

        .chosen-time {
            color: #ffb366;
            font-size: 1.2em;
            margin: 10px 0;
            background: rgba(255,140,0,0.1);
            padding: 10px 20px;
            border-radius: 12px;
            display: inline-block;
        }

        .email-sent {
            color: #98fb98;
            font-size: 0.9em;
            margin-top: 20px;
            opacity: 0.9;
        }

        .decoration {
            font-size: 22px;
            margin-top: 15px;
            opacity: 0.7;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="icon">🌳</div>
            <div class="meeting-text">До встречи!</div>
            <div class="chosen-time" id="chosenTimeDisplay"></div>
           <div class="email-sent" id="emailStatus">
    ✅ Я уже получил уведомление!
</div>
<button id="manualSendBtn" style="display:none; background: #ff8c00; color: white; border: none; padding: 14px 24px; border-radius: 14px; font-size: 1em; margin-top: 15px; width: 100%; cursor: pointer;">
    📩 Отправить вручную
</button>
            <div class="decoration">🌿 ☀️ 🌿</div>
        </div>
    </div>

    <form id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST" style="display:none;">
        <input type="hidden" name="_subject" value="🌳 Время прогулки выбрано!">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const timeFromUrl = urlParams.get('time');
        
        if (timeFromUrl) {
            const decodedTime = decodeURIComponent(timeFromUrl);
            document.getElementById('chosenTimeDisplay').textContent = `🕐 ${decodedTime}`;
            
            document.getElementById('formTime').value = decodedTime;
            document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
            document.getElementById('formMessage').value = `🌳 Время прогулки: "${decodedTime}"\n\nДата выбора: ${new Date().toLocaleString('ru-RU')}`;
            
            const form = document.getElementById('emailForm');
form.target = 'hiddenFrame';

form.addEventListener('submit', function() {
    form.dataset.sent = 'true';
});

setTimeout(() => {
    form.submit();
    
    setTimeout(() => {
        if (!form.dataset.sent) {
            document.getElementById('emailStatus').innerHTML = '⚠️ Автоотправка не сработала';
            const btn = document.getElementById('manualSendBtn');
            btn.style.display = 'block';
            btn.addEventListener('click', function() {
                form.submit();
                document.getElementById('emailStatus').innerHTML = '✅ Отправлено!';
                btn.style.display = 'none';
            });
        }
    }, 2000);
}, 500);
        } else {
            document.getElementById('chosenTimeDisplay').textContent = '🕐 Время не указано';
        }
    </script>
</body>
</html>
