<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До встречи!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f7f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 24px rgba(0,0,0,0.04);
            border: 1px solid #e8e0d5;
            animation: appear 0.7s ease;
        }
        @keyframes appear {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .line {
            width: 32px;
            height: 1px;
            background: #c4a97d;
            margin: 0 auto 28px;
            opacity: 0.5;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 2.2rem;
            color: #3d3226;
            font-weight: 400;
            margin-bottom: 18px;
        }
        .time-box {
            display: inline-block;
            padding: 10px 24px;
            background: #f9f6f0;
            border: 1px solid #e5ddd0;
            border-radius: 30px;
            color: #5a4a38;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
        .status {
            color: #7a9a7a;
            font-size: 0.9rem;
            font-style: italic;
        }
        .manual-btn {
            display: none;
            background: none;
            border: 1px solid #c4a97d;
            color: #5a4a38;
            padding: 8px 24px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 12px;
        }
        .manual-btn:hover {
            background: rgba(196,169,125,0.06);
        }
        .footer {
            margin-top: 28px;
            color: #c4b9a8;
            font-size: 0.85rem;
            font-style: italic;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="line"></div>
        <div class="icon">🌳</div>
        <div class="title">До встречи!</div>
        <div class="time-box" id="timeDisplay"></div>
        <div class="status" id="status">✓ Уведомление отправлено</div>
        <button class="manual-btn" id="manualBtn">Отправить вручную</button>
        <div class="footer">🌿 ☀️ 🌿</div>
    </div>
    <form class="hidden" id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Время прогулки выбрано">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>
    <iframe name="hiddenFrame" class="hidden"></iframe>
    <script>
        var params = new URLSearchParams(window.location.search);
        var time = params.get('time');
        var display = document.getElementById('timeDisplay');
        if (time) {
            display.textContent = '🕐 ' + decodeURIComponent(time);
        } else {
            display.textContent = 'Время не указано';
        }
        document.getElementById('formTime').value = time || '';
        document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
        document.getElementById('formMessage').value = 'Время: "' + (time || '') + '"\nДата: ' + new Date().toLocaleString('ru-RU');
        var form = document.getElementById('emailForm');
        form.target = 'hiddenFrame';
        var sent = false;
        function sendForm() {
            if (sent) return;
            sent = true;
            form.submit();
            document.getElementById('status').textContent = '✓ Отправлено';
            document.getElementById('manualBtn').style.display = 'none';
        }
        setTimeout(function() {
            sendForm();
            setTimeout(function() {
                if (!sent) {
                    document.getElementById('status').textContent = '⚠ Не отправилось автоматически';
                    document.getElementById('manualBtn').style.display = 'inline-block';
                }
            }, 3000);
        }, 500);
        document.getElementById('manualBtn').addEventListener('click', sendForm);
    </script>
</body>
</html>
