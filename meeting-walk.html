<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До встречи!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1e14;
            color: #d4d8c8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(60, 90, 40, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(40, 70, 30, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(30, 50, 20, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .texture {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(120, 160, 80, 0.5) 60px, rgba(120, 160, 80, 0.5) 61px),
                repeating-linear-gradient(-30deg, transparent, transparent 80px, rgba(100, 140, 60, 0.4) 80px, rgba(100, 140, 60, 0.4) 81px);
        }

        .leaves-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .leaf-particle {
            position: absolute;
            font-size: 18px;
            animation: leafDrift var(--dur) linear infinite;
            animation-delay: var(--delay);
            opacity: 0;
            filter: blur(0.5px);
        }

        @keyframes leafDrift {
            0% {
                transform: translateY(105vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            50% {
                transform: translateY(50vh) translateX(var(--drift)) rotate(180deg);
                opacity: 0.5;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) translateX(calc(var(--drift) * 2)) rotate(360deg);
                opacity: 0;
            }
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(22, 26, 18, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 52px 38px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(120, 150, 80, 0.2);
            box-shadow:
                0 0 80px rgba(0, 0, 0, 0.6),
                0 0 150px rgba(80, 120, 40, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            animation: cardReveal 1s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: linear-gradient(160deg,
                    rgba(140, 180, 80, 0.3),
                    transparent 30%,
                    transparent 70%,
                    rgba(100, 140, 50, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
            filter: drop-shadow(0 0 30px rgba(140, 190, 60, 0.4));
            animation: iconPop 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s both;
        }

        @keyframes iconPop {
            from {
                transform: scale(0.3);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 2.6rem;
            color: #c8d8a8;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
            animation: fadeUp 0.8s ease 0.25s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time-box {
            display: inline-block;
            padding: 14px 28px;
            background: rgba(80, 120, 30, 0.1);
            border: 1px solid rgba(140, 180, 80, 0.25);
            border-radius: 40px;
            color: #c8d8a0;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            animation: fadeUp 0.8s ease 0.4s both;
        }

        .status {
            font-size: 0.8rem;
            color: rgba(170, 200, 120, 0.6);
            font-style: italic;
            font-weight: 300;
            animation: fadeUp 0.8s ease 0.55s both;
        }

        .manual-btn {
            display: none;
            background: rgba(80, 120, 30, 0.08);
            border: 1px solid rgba(140, 180, 80, 0.3);
            color: rgba(200, 230, 140, 0.8);
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s;
        }

        .manual-btn:hover {
            background: rgba(100, 160, 30, 0.15);
            border-color: rgba(180, 220, 100, 0.5);
            box-shadow: 0 0 20px rgba(120, 180, 40, 0.1);
        }

        .footer-text {
            margin-top: 36px;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(150, 180, 110, 0.3);
            animation: fadeUp 0.8s ease 0.7s both;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="texture"></div>
    <div class="leaves-container" id="leavesContainer"></div>

    <div class="card">
        <span class="icon">🌳</span>
        <div class="title">До встречи!</div>
        <div class="time-box" id="timeDisplay"></div>
        <div class="status" id="status">Уведомление отправлено</div>
        <button class="manual-btn" id="manualBtn">Отправить вручную</button>
        <div class="footer-text">🌱 Осень 2024</div>
    </div>

    <form class="hidden" id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Время прогулки выбрано">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" class="hidden"></iframe>

    <script>
        // Листья
        const leavesContainer = document.getElementById('leavesContainer');
        const leafEmojis = ['🍃', '🌿', '🍂', '🍁', '🌱', '🪴'];

        for (let i = 0; i < 25; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf-particle';
            leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
            leaf.style.left = Math.random() * 100 + '%';
            leaf.style.setProperty('--dur', (Math.random() * 12 + 8) + 's');
            leaf.style.setProperty('--delay', Math.random() * 10 + 's');
            leaf.style.setProperty('--drift', (Math.random() * 160 - 80) + 'px');
            leaf.style.fontSize = (Math.random() * 16 + 12) + 'px';
            leavesContainer.appendChild(leaf);
        }

        const params = new URLSearchParams(window.location.search);
        const time = params.get('time');
        const display = document.getElementById('timeDisplay');

        if (time) {
            display.textContent = '🕐 ' + decodeURIComponent(time);
        } else {
            display.textContent = 'Время не указано';
        }

        document.getElementById('formTime').value = time || '';
        document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
        document.getElementById('formMessage').value = 'Время: "' + (time || '') + '"\nДата: ' + new Date().toLocaleString(
            'ru-RU');

        const form = document.getElementById('emailForm');
        form.target = 'hiddenFrame';
        let sent = false;

        function sendForm() {
            if (sent) return;
            sent = true;
            form.submit();
            document.getElementById('status').textContent = 'Отправлено';
            document.getElementById('manualBtn').style.display = 'none';
        }

        setTimeout(() => {
            sendForm();
            setTimeout(() => {
                if (!sent) {
                    document.getElementById('status').textContent = 'Не отправилось автоматически';
                    document.getElementById('manualBtn').style.display = 'inline-block';
                }
            }, 3000);
        }, 600);

        document.getElementById('manualBtn').addEventListener('click', sendForm);
    </script>
</body>
</html>
