<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До встречи! 🌳</title>
    <style>
        :root {
            --orange: #ff8c00;
            --orange-light: #ffb366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
            background: #0a0a1a;
            overflow: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(45deg, #1a1a0a, #1a0a0a, #0a1a0a, #0a0a1a);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Фейерверки */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 2;
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: sparkBurst 1.5s ease-out forwards;
        }

        @keyframes sparkBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Конфетти */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            animation: confettiFall var(--duration) linear infinite;
            animation-delay: var(--delay);
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(var(--spin));
                opacity: 0;
            }
        }

        .container {
            background: rgba(20, 20, 40, 0.85);
            border-radius: 30px;
            padding: 40px 25px;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 
                0 0 50px rgba(255, 140, 0, 0.3),
                0 0 100px rgba(255, 100, 0, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            text-align: center;
            animation: cardPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPopIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .glow-border {
            position: absolute;
            inset: -3px;
            border-radius: 33px;
            padding: 3px;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(255, 140, 0, 0.6),
                rgba(255, 200, 0, 0.6),
                rgba(255, 140, 0, 0.6),
                transparent
            );
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spinGlow 4s linear infinite;
            pointer-events: none;
        }

        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .icon {
            font-size: 70px;
            display: inline-block;
            animation: celebrateIcon 0.8s ease-out, floatIcon 3s ease-in-out 0.8s infinite;
            filter: drop-shadow(0 0 30px rgba(255, 140, 0, 0.8));
        }

        @keyframes celebrateIcon {
            0% { transform: scale(0) rotate(-180deg); }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .meeting-text {
            font-size: 2.5em;
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(to right, #ffffff, #ffb366, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: textShine 2s ease-in-out infinite;
        }

        @keyframes textShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .chosen-time {
            color: #ffb366;
            font-size: 1.3em;
            margin: 15px 0;
            padding: 15px 25px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 15px;
            display: inline-block;
            border: 1px solid rgba(255, 140, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeSlideUp 0.6s ease-out 0.5s both;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .email-status {
            color: #7fff7f;
            font-size: 1em;
            margin-top: 25px;
            padding: 12px 20px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 12px;
            display: inline-block;
            animation: fadeSlideUp 0.6s ease-out 0.7s both;
        }

        .manual-btn {
            display: none;
            background: linear-gradient(135deg, #ff8c00, #ff4500);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 16px;
            font-size: 1.1em;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            box-shadow: 0 8px 30px rgba(255, 69, 0, 0.4);
            transition: all 0.3s ease;
        }

        .manual-btn:active {
            transform: scale(0.95);
        }

        .decoration {
            font-size: 28px;
            margin-top: 25px;
            opacity: 0.6;
            letter-spacing: 12px;
        }

        .decoration span {
            display: inline-block;
            animation: floatDecor 3s ease-in-out infinite;
        }

        .decoration span:nth-child(2) { animation-delay: 0.4s; }
        .decoration span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes floatDecor {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div id="fireworksContainer"></div>
    <div id="confettiContainer"></div>

    <div class="container">
        <div class="glow-border"></div>
        <div class="content">
            <div class="icon">🌳</div>
            <div class="meeting-text">До встречи!</div>
            <div class="chosen-time" id="chosenTimeDisplay"></div>
            <div class="email-status" id="emailStatus">✅ Я уже получил уведомление!</div>
            <button class="manual-btn" id="manualSendBtn">📩 Отправить вручную</button>
            <div class="decoration">
                <span>🌿</span>
                <span>☀️</span>
                <span>🌿</span>
            </div>
        </div>
    </div>

    <form id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST" style="display:none;">
        <input type="hidden" name="_subject" value="🌳 Время прогулки выбрано!">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <script>
        // Фейерверки
        function createFirework(x, y) {
            const colors = ['#ff8c00', '#ff6347', '#ffd700', '#ff4500', '#ff1493', '#00ff7f', '#ffb366'];
            const container = document.getElementById('fireworksContainer');
            
            for (let i = 0; i < 30; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (Math.PI * 2 * i) / 30;
                const distance = 50 + Math.random() * 100;
                spark.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                container.appendChild(spark);
                
                setTimeout(() => spark.remove(), 1500);
            }
        }

        // Запуск фейерверков
        function launchFireworks() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight * 0.6;
                    createFirework(x, y);
                }, i * 600);
            }
        }

        // Конфетти
        function createConfetti() {
            const colors = ['#ff8c00', '#ff6347', '#ffd700', '#ff4500', '#ff1493', '#ffb366', '#ff69b4', '#00ff7f'];
            const container = document.getElementById('confettiContainer');
            
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.width = (Math.random() * 10 + 5) + 'px';
                piece.style.height = (Math.random() * 10 + 5) + 'px';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.setProperty('--duration', (Math.random() * 3 + 4) + 's');
                piece.style.setProperty('--delay', Math.random() * 3 + 's');
                piece.style.setProperty('--spin', (Math.random() * 720 - 360) + 'deg');
                container.appendChild(piece);
            }
        }

        launchFireworks();
        createConfetti();

        // Повторяем фейерверки
        setInterval(() => {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight * 0.5;
            createFirework(x, y);
        }, 3000);

        // Логика отправки
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const timeFromUrl = urlParams.get('time');
            const chosenTimeDisplay = document.getElementById('chosenTimeDisplay');
            const emailStatus = document.getElementById('emailStatus');
            const manualBtn = document.getElementById('manualSendBtn');
            const emailForm = document.getElementById('emailForm');

            if (!timeFromUrl) {
                chosenTimeDisplay.textContent = '🕐 Время не указано';
                return;
            }

            const decodedTime = decodeURIComponent(timeFromUrl);
            chosenTimeDisplay.textContent = `🕐 ${decodedTime}`;

            document.getElementById('formTime').value = decodedTime;
            document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
            document.getElementById('formMessage').value = `🌳 Время: "${decodedTime}"\nДата: ${new Date().toLocaleString('ru-RU')}`;

            emailForm.target = 'hiddenFrame';
            let isSent = false;

            function submitForm() {
                if (isSent) return;
                isSent = true;
                emailForm.submit();
                emailStatus.innerHTML = '✅ Отправлено!';
                manualBtn.style.display = 'none';
            }

            setTimeout(() => {
                submitForm();
                setTimeout(() => {
                    if (!isSent) {
                        emailStatus.innerHTML = '⚠️ Не отправилось автоматически';
                        manualBtn.style.display = 'block';
                    }
                }, 3000);
            }, 500);

            manualBtn.addEventListener('click', submitForm);
        })();
    </script>
</body>
</html>
