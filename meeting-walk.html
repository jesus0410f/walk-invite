<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До встречи!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(60, 40, 20, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(40, 30, 20, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(20, 15, 10, 0.4) 0%, transparent 60%);
            z-index: 0;
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 1px;
            height: 1px;
            background: rgba(200, 160, 100, 0.6);
            border-radius: 50%;
            animation: floatUp var(--dur) linear infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(20, 18, 15, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 50px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(180, 150, 100, 0.15);
            box-shadow: 
                0 0 60px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(160, 120, 60, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            animation: cardReveal 1s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 29px;
            padding: 1px;
            background: linear-gradient(135deg, 
                rgba(200, 160, 100, 0.3), 
                transparent 40%, 
                transparent 60%, 
                rgba(200, 160, 100, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 24px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(200, 150, 80, 0.4));
            animation: iconPop 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s both;
        }

        @keyframes iconPop {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 2.6rem;
            color: #e8dcc8;
            margin-bottom: 20px;
            letter-spacing: 1px;
            animation: fadeUp 0.8s ease 0.3s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time-box {
            display: inline-block;
            padding: 14px 28px;
            background: rgba(180, 150, 100, 0.08);
            border: 1px solid rgba(180, 150, 100, 0.25);
            border-radius: 40px;
            color: #d4c4a0;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            animation: fadeUp 0.8s ease 0.45s both;
        }

        .status {
            font-size: 0.8rem;
            color: rgba(180, 160, 130, 0.6);
            font-style: italic;
            font-weight: 300;
            animation: fadeUp 0.8s ease 0.6s both;
        }

        .manual-btn {
            display: none;
            background: rgba(180, 150, 100, 0.05);
            border: 1px solid rgba(200, 160, 100, 0.3);
            color: rgba(220, 190, 150, 0.8);
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s;
        }

        .manual-btn:hover {
            background: rgba(200, 160, 100, 0.1);
            border-color: rgba(220, 180, 120, 0.5);
            box-shadow: 0 0 20px rgba(180, 140, 80, 0.1);
        }

        .footer-text {
            margin-top: 32px;
            font-size: 0.65rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(180, 150, 120, 0.3);
            animation: fadeUp 0.8s ease 0.7s both;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="card">
        <span class="icon">🌳</span>
        <div class="title">До встречи!</div>
        <div class="time-box" id="timeDisplay"></div>
        <div class="status" id="status">Уведомление отправлено</div>
        <button class="manual-btn" id="manualBtn">Отправить вручную</button>
        <div class="footer-text">Осень 2024</div>
    </div>

    <form class="hidden" id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Время прогулки выбрано">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" class="hidden"></iframe>

    <script>
        // Партиклы
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.setProperty('--dur', (Math.random() * 10 + 8) + 's');
            p.style.setProperty('--delay', Math.random() * 8 + 's');
            particlesContainer.appendChild(p);
        }

        const params = new URLSearchParams(window.location.search);
        const time = params.get('time');
        const display = document.getElementById('timeDisplay');

        if (time) {
            display.textContent = '🕐 ' + decodeURIComponent(time);
        } else {
            display.textContent = 'Время не указано';
        }

        document.getElementById('formTime').value = time || '';
        document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
        document.getElementById('formMessage').value = 'Время: "' + (time || '') + '"\nДата: ' + new Date().toLocaleString('ru-RU');

        const form = document.getElementById('emailForm');
        form.target = 'hiddenFrame';
        let sent = false;

        function sendForm() {
            if (sent) return;
            sent = true;
            form.submit();
            document.getElementById('status').textContent = 'Отправлено';
            document.getElementById('manualBtn').style.display = 'none';
        }

        setTimeout(() => {
            sendForm();
            setTimeout(() => {
                if (!sent) {
                    document.getElementById('status').textContent = 'Не отправилось автоматически';
                    document.getElementById('manualBtn').style.display = 'inline-block';
                }
            }, 3000);
        }, 600);

        document.getElementById('manualBtn').addEventListener('click', sendForm);
    </script>
</body>
</html>
