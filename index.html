<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-accent: #0f3460;
            --orange: #ff8c00;
            --orange-light: #ffb366;
            --orange-red: #ff6347;
            --card-bg: rgba(25, 25, 45, 0.95);
            --input-bg: rgba(40, 40, 65, 0.9);
            --input-focus-bg: rgba(50, 50, 75, 0.95);
            --shadow-glow: 0 0 80px rgba(255, 140, 0, 0.2);
            --shadow-warm: 0 20px 50px rgba(0, 0, 0, 0.4);
            --border-color: rgba(255, 140, 0, 0.5);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary), var(--bg-accent));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Звёздный фон */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }

        /* Парящие частицы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--orange);
            border-radius: 50%;
            filter: blur(1px);
            animation: float-up var(--duration) ease-in infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0) scale(0);
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--drift)) scale(1.5);
            }
        }

        .container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 
                var(--shadow-warm), 
                var(--shadow-glow), 
                0 0 120px rgba(255, 100, 50, 0.15),
                inset 0 1px 0 rgba(255,255,255,0.05);
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
            z-index: 2;
            backdrop-filter: blur(10px);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow: 
                var(--shadow-warm), 
                0 0 100px rgba(255, 140, 0, 0.3), 
                0 0 150px rgba(255, 100, 50, 0.2);
        }

        /* Анимированная рамка */
        .container::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: 
                radial-gradient(circle, rgba(255,140,0,0.08) 0%, transparent 60%),
                radial-gradient(circle at 70% 30%, rgba(255,100,50,0.06) 0%, transparent 60%);
            animation: rotate 25s linear infinite;
            pointer-events: none;
        }

        /* Светящийся край */
        .container::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius);
            padding: 2px;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,140,0,0.3) 50%,
                transparent 70%
            );
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: border-glow 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes border-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255,140,0,0.6));
            animation: float 3s ease-in-out infinite;
            cursor: default;
        }

        h1 {
            color: var(--orange);
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 
                0 0 25px rgba(255,140,0,0.5),
                0 0 50px rgba(255,140,0,0.2);
            line-height: 1.2;
            background: linear-gradient(to right, #ff8c00, #ff6347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--orange-light);
            text-align: center;
            font-size: 1em;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .input-group {
            margin: 25px 0;
            position: relative;
        }

        .input-label {
            color: var(--orange-light);
            font-size: 1em;
            margin-bottom: 12px;
            display: block;
            text-align: center;
        }

        .time-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1em;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: white;
            outline: none;
            transition: all var(--transition);
            text-align: center;
            -webkit-appearance: none;
            font-family: inherit;
            position: relative;
        }

        .time-input:focus {
            border-color: var(--orange);
            box-shadow: 
                0 0 25px rgba(255,140,0,0.3),
                inset 0 0 15px rgba(255,140,0,0.1);
            background: var(--input-focus-bg);
            transform: scale(1.02);
        }

        .time-input::placeholder {
            color: rgba(255, 179, 102, 0.5);
            font-size: 0.95em;
        }

        /* Пульсирующая точка у инпута */
        .input-group::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 15px;
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(255,140,0,0.7);
            }
            50% { 
                box-shadow: 0 0 0 15px rgba(255,140,0,0);
            }
        }

        .examples {
            color: var(--orange-light);
            font-size: 0.8em;
            margin-top: 10px;
            opacity: 0.7;
            text-align: center;
            line-height: 1.4;
        }

        .confirm-btn {
            background: linear-gradient(135deg, var(--orange), var(--orange-red));
            color: white;
            border: none;
            padding: 15px;
            border-radius: var(--radius-sm);
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            transition: all var(--transition);
            margin-top: 20px;
            font-weight: 600;
            -webkit-appearance: none;
            box-shadow: 
                0 5px 25px rgba(255,140,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        /* Блик на кнопке */
        .confirm-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.2),
                transparent
            );
            transition: left 0.5s;
        }

        .confirm-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .confirm-btn:not(:disabled) {
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { 
                box-shadow: 0 5px 25px rgba(255,140,0,0.3);
            }
            50% { 
                box-shadow: 0 5px 40px rgba(255,140,0,0.6);
            }
        }

        .confirm-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .confirm-btn:disabled {
            opacity: 0.4;
            box-shadow: none;
            cursor: not-allowed;
            animation: none;
        }

        .decoration {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            opacity: 0.6;
            letter-spacing: 8px;
            animation: float 4s ease-in-out infinite;
            animation-delay: 1s;
        }
    </style>
</head>
<body>
    <!-- Звёзды -->
    <div class="stars" id="stars"></div>
    
    <!-- Парящие частицы -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="content">
            <div class="icon">🌳</div>
            <h1>Приглашаю на прогулку!</h1>
            <p class="subtitle">Выбери удобное время:</p>
            
            <div class="input-group">
                <label class="input-label" for="timeInput">🕐 Когда тебе удобно?</label>
                <input 
                    type="text" 
                    class="time-input" 
                    id="timeInput" 
                    placeholder="Например: Завтра в 18:00"
                    autocomplete="off"
                    inputmode="text"
                    aria-label="Введите удобное время для прогулки"
                >
                <div class="examples">
                    💡 Например: "Сегодня вечером", "В субботу после обеда", "Завтра в 17:30"
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled aria-label="Подтвердить выбранное время">
                Подтвердить время ✨
            </button>

            <div class="decoration">🌿 ☀️ 🌿</div>
        </div>
    </div>

    <script>
        // Генерация звёзд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const count = 50;
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 3 + 's');
                starsContainer.appendChild(star);
            }
        }

        // Генерация частиц
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const count = 15;
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '0';
                particle.style.setProperty('--duration', (Math.random() * 5 + 5) + 's');
                particle.style.setProperty('--delay', Math.random() * 5 + 's');
                particle.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
                particlesContainer.appendChild(particle);
            }
        }

        createStars();
        createParticles();

        // Логика формы
        (function() {
            const timeInput = document.getElementById('timeInput');
            const confirmBtn = document.getElementById('confirmBtn');

            function updateButtonState() {
                const hasValue = timeInput.value.trim().length > 0;
                confirmBtn.disabled = !hasValue;
            }

            function goToNextPage() {
                const selectedTime = timeInput.value.trim();
                if (!selectedTime) return;
                
                const encodedTime = encodeURIComponent(selectedTime);
                window.location.href = `meeting-walk.html?time=${encodedTime}`;
            }

            timeInput.addEventListener('input', updateButtonState);
            timeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !confirmBtn.disabled) {
                    e.preventDefault();
                    goToNextPage();
                }
            });

            confirmBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!confirmBtn.disabled) {
                    goToNextPage();
                }
            });

            window.addEventListener('load', () => {
                setTimeout(() => timeInput.focus(), 300);
            });
        })();
    </script>
</body>
</html>
