<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #faf9f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #2c2416;
            -webkit-font-smoothing: antialiased;
        }

        /* Фоновое изображение — мягкий градиент с текстурой */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(180, 160, 140, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(160, 140, 120, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200, 180, 150, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 32px;
            padding: 56px 40px;
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.02),
                0 4px 16px rgba(0, 0, 0, 0.03),
                0 12px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        /* Декоративная линия */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .ornament::before,
        .ornament::after {
            content: '';
            width: 48px;
            height: 1px;
            background: #d4c8b8;
            opacity: 0.6;
        }

        .ornament-dot {
            width: 4px;
            height: 4px;
            background: #b8a58e;
            border-radius: 50%;
            opacity: 0.6;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 28px;
            display: block;
            line-height: 1;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 500;
            font-size: 2.2rem;
            color: #2c2416;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 1.05rem;
            color: #8b7b68;
            margin-bottom: 48px;
            font-weight: 400;
        }

        .input-group {
            text-align: left;
            margin-bottom: 32px;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a89880;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .time-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            border: 1px solid #e8e0d5;
            border-radius: 14px;
            background: #fdfcf9;
            color: #2c2416;
            outline: none;
            transition: all 0.25s ease;
            letter-spacing: 0.2px;
        }

        .time-input:hover {
            border-color: #d4c8b8;
            background: #fff;
        }

        .time-input:focus {
            border-color: #b8a58e;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(180, 150, 120, 0.08);
            outline: none;
        }

        .time-input::placeholder {
            color: #c4b9a8;
            font-style: italic;
            font-weight: 300;
        }

        .hint {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .hint span {
            font-size: 0.78rem;
            color: #b8a894;
            font-style: italic;
            cursor: pointer;
            transition: color 0.2s;
            border-bottom: 1px dashed transparent;
            padding-bottom: 2px;
        }

        .hint span:hover {
            color: #8b7b68;
            border-bottom-color: #d4c8b8;
        }

        .confirm-btn {
            width: 100%;
            padding: 18px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: #2c2416;
            color: #faf8f5;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .confirm-btn:hover:not(:disabled) {
            background: #3d3224;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(44, 36, 22, 0.15);
        }

        .confirm-btn:active:not(:disabled) {
            transform: translateY(0);
            transition: transform 0.1s;
        }

        .confirm-btn:disabled {
            background: #e8e2d8;
            color: #b8a894;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .footer-text {
            margin-top: 36px;
            font-size: 0.8rem;
            color: #c4b9a8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ornament">
            <span class="ornament-dot"></span>
        </div>
        <span class="icon">🍂</span>
        <h1>Приглашение<br>на прогулку</h1>
        <p class="subtitle">Выберите удобное время</p>
        
        <div class="input-group">
            <label class="input-label" for="timeInput">Когда вам удобно?</label>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="time-input" 
                    id="timeInput" 
                    placeholder="Завтра в 18:00"
                    autocomplete="off"
                >
            </div>
            <div class="hint">
                <span onclick="setTime('Сегодня вечером')">Сегодня вечером</span>
                <span onclick="setTime('В субботу днём')">В субботу днём</span>
                <span onclick="setTime('Завтра в 17:30')">Завтра в 17:30</span>
            </div>
        </div>

        <button class="confirm-btn" id="confirmBtn" disabled>
            Подтвердить
        </button>
        <div class="footer-text">Осень 2024</div>
    </div>

    <script>
        const input = document.getElementById('timeInput');
        const btn = document.getElementById('confirmBtn');

        function setTime(value) {
            input.value = value;
            btn.disabled = false;
            input.focus();
        }

        input.addEventListener('input', function() {
            btn.disabled = input.value.trim().length === 0;
        });

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !btn.disabled) {
                e.preventDefault();
                go();
            }
        });

        btn.addEventListener('click', function(e) {
            e.preventDefault();
            if (!btn.disabled) go();
        });

        function go() {
            var time = encodeURIComponent(input.value.trim());
            window.location.href = 'meeting-walk.html?time=' + time;
        }

        window.addEventListener('load', function() {
            setTimeout(function() { input.focus(); }, 400);
        });
    </script>
</body>
</html>
