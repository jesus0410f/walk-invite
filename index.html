<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f5f3ef;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 1px 15px rgba(0,0,0,0.03);
            border: 1px solid #e8e2d8;
        }
        .line {
            width: 32px;
            height: 1px;
            background: #bfb0a0;
            margin: 0 auto 28px;
            opacity: 0.4;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            color: #3d3226;
            font-weight: 400;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .subtitle {
            color: #9b8c7a;
            font-style: italic;
            margin-bottom: 36px;
            font-size: 1rem;
        }
        .input-group {
            text-align: left;
            margin: 24px 0;
        }
        .input-label {
            font-size: 0.9rem;
            color: #6b5e4f;
            margin-bottom: 8px;
            display: block;
        }
        .time-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid #e0d8cc;
            border-radius: 12px;
            background: #fdfcf9;
            color: #3d3226;
            outline: none;
            transition: 0.2s;
        }
        .time-input:focus {
            border-color: #bfb0a0;
            box-shadow: 0 0 0 3px rgba(180,160,140,0.08);
        }
        .time-input::placeholder {
            color: #c4b9a8;
            font-style: italic;
        }
        .hint {
            font-size: 0.8rem;
            color: #b8a894;
            margin-top: 6px;
            font-style: italic;
        }
        .btn {
            width: 100%;
            padding: 15px;
            font-family: inherit;
            font-size: 1rem;
            background: #4a3f33;
            color: #faf8f5;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 22px;
            transition: 0.2s;
        }
        .btn:hover:not(:disabled) {
            background: #5a4e40;
        }
        .btn:disabled {
            background: #ddd6cc;
            color: #a89880;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 28px;
            color: #c4b9a8;
            font-size: 0.85rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="line"></div>
        <div class="icon">🍂</div>
        <h1>Приглашение на прогулку</h1>
        <p class="subtitle">Выберите удобное время</p>
        <div class="input-group">
            <label class="input-label" for="timeInput">Когда вам удобно?</label>
            <input type="text" class="time-input" id="timeInput" placeholder="Например: завтра в 18:00" autocomplete="off">
            <div class="hint">«Сегодня вечером» • «В субботу днём» • «Завтра в 17:30»</div>
        </div>
        <button class="btn" id="confirmBtn" disabled>Подтвердить время</button>
        <div class="footer">🌿 ☀️ 🌿</div>
    </div>
    <script>
        const input = document.getElementById('timeInput');
        const btn = document.getElementById('confirmBtn');
        input.addEventListener('input', function() {
            btn.disabled = input.value.trim().length === 0;
        });
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !btn.disabled) {
                e.preventDefault();
                go();
            }
        });
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            if (!btn.disabled) go();
        });
        function go() {
            var time = encodeURIComponent(input.value.trim());
            window.location.href = 'meeting-walk.html?time=' + time;
        }
        window.addEventListener('load', function() {
            setTimeout(function() { input.focus(); }, 300);
        });
    </script>
</body>
</html>
