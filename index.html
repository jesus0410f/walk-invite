<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #faf8f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Акварельный фон */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(210, 180, 140, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(180, 160, 130, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200, 170, 120, 0.06) 0%, transparent 50%);
            z-index: 0;
        }

        /* Тонкие линии на фоне */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.04;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 40px,
                #8b7355 40px,
                #8b7355 41px
            );
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 35px;
            max-width: 440px;
            width: 100%;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.04),
                0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(180, 160, 130, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 40px rgba(0, 0, 0, 0.06),
                0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .decorative-line {
            width: 40px;
            height: 1px;
            background: #c4a97d;
            margin: 0 auto 30px;
            opacity: 0.5;
        }

        .icon {
            font-size: 52px;
            margin-bottom: 24px;
            display: inline-block;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-family: 'Georgia', serif;
            font-weight: 400;
            font-size: 2rem;
            color: #3d3226;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .subtitle {
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #9b8c7a;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .input-group {
            margin: 30px 0;
            text-align: left;
        }

        .input-label {
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            color: #6b5e4f;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            pointer-events: none;
            opacity: 0.5;
        }

        .time-input {
            width: 100%;
            padding: 16px 20px 16px 48px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(180, 160, 130, 0.3);
            border-radius: 12px;
            color: #3d3226;
            outline: none;
            transition: all 0.3s ease;
            text-align: left;
        }

        .time-input:focus {
            border-color: #c4a97d;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(196, 169, 125, 0.08);
        }

        .time-input::placeholder {
            color: #c4b9a8;
            font-style: italic;
        }

        .hint {
            font-size: 0.8rem;
            color: #b8a894;
            margin-top: 8px;
            font-style: italic;
            line-height: 1.4;
        }

        .confirm-btn {
            width: 100%;
            padding: 16px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            letter-spacing: 0.8px;
            background: #3d3226;
            color: #faf8f5;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .confirm-btn:hover:not(:disabled) {
            background: #5a4a38;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(61, 50, 38, 0.15);
        }

        .confirm-btn:active:not(:disabled) {
            transform: translateY(0);
            transition: transform 0.1s;
        }

        .confirm-btn:disabled {
            background: #d4cdc2;
            color: #a89880;
            cursor: not-allowed;
            transform: none;
        }

        .footer-note {
            margin-top: 32px;
            font-size: 0.85rem;
            color: #c4b9a8;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .footer-note span {
            display: inline-block;
            margin: 0 6px;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        .footer-note span:nth-child(2) {
            animation-delay: 0.5s;
        }

        .footer-note span:nth-child(3) {
            animation-delay: 1s;
        }
    </style>
</head>
<body>
    <div class="bg-lines"></div>

    <div class="card">
        <div class="decorative-line"></div>
        <div class="icon">🍂</div>
        <h1>Приглашение<br>на прогулку</h1>
        <p class="subtitle">Выберите удобное время</p>
        
        <div class="input-group">
            <label class="input-label" for="timeInput">Когда вам удобно?</label>
            <div class="input-wrapper">
                <span class="input-icon">🕐</span>
                <input 
                    type="text" 
                    class="time-input" 
                    id="timeInput" 
                    placeholder="Например: завтра в 18:00"
                    autocomplete="off"
                >
            </div>
            <div class="hint">
                💡 «Сегодня вечером» • «В субботу днём» • «Завтра в 17:30»
            </div>
        </div>

        <button class="confirm-btn" id="confirmBtn" disabled>
            Подтвердить время
        </button>

        <div class="footer-note">
            <span>🌿</span>
            <span>☀️</span>
            <span>🌿</span>
        </div>
    </div>

    <script>
        (function() {
            const timeInput = document.getElementById('timeInput');
            const confirmBtn = document.getElementById('confirmBtn');

            function updateButtonState() {
                const hasValue = timeInput.value.trim().length > 0;
                confirmBtn.disabled = !hasValue;
            }

            function goToNextPage() {
                const selectedTime = timeInput.value.trim();
                if (!selectedTime) return;
                const encodedTime = encodeURIComponent(selectedTime);
                window.location.href = `meeting-walk.html?time=${encodedTime}`;
            }

            timeInput.addEventListener('input', updateButtonState);
            
            timeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !confirmBtn.disabled) {
                    e.preventDefault();
                    goToNextPage();
                }
            });
            
            confirmBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!confirmBtn.disabled) goToNextPage();
            });

            // Автофокус при загрузке
            window.addEventListener('load', () => {
                setTimeout(() => timeInput.focus(), 500);
            });
        })();
    </script>
</body>
</html>
