<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1e14;
            color: #d4d8c8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Фон — крупные органические пятна */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(60, 90, 40, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(40, 70, 30, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(30, 50, 20, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Текстура листьев — тонкие линии */
        .texture {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(120, 160, 80, 0.5) 60px, rgba(120, 160, 80, 0.5) 61px),
                repeating-linear-gradient(-30deg, transparent, transparent 80px, rgba(100, 140, 60, 0.4) 80px, rgba(100, 140, 60, 0.4) 81px);
        }

        /* Парящие частицы-листья */
        .leaves-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .leaf-particle {
            position: absolute;
            font-size: 18px;
            animation: leafDrift var(--dur) linear infinite;
            animation-delay: var(--delay);
            opacity: 0;
            filter: blur(0.5px);
        }

        @keyframes leafDrift {
            0% {
                transform: translateY(105vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            50% {
                transform: translateY(50vh) translateX(var(--drift)) rotate(180deg);
                opacity: 0.5;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) translateX(calc(var(--drift) * 2)) rotate(360deg);
                opacity: 0;
            }
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(22, 26, 18, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 52px 38px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(120, 150, 80, 0.2);
            box-shadow:
                0 0 80px rgba(0, 0, 0, 0.6),
                0 0 150px rgba(80, 120, 40, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: linear-gradient(160deg,
                    rgba(140, 180, 80, 0.3),
                    transparent 30%,
                    transparent 70%,
                    rgba(100, 140, 50, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 24px;
            display: block;
            filter: drop-shadow(0 0 24px rgba(140, 190, 60, 0.3));
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 2.3rem;
            color: #c8d8a8;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: rgba(180, 200, 140, 0.7);
            margin-bottom: 42px;
            font-weight: 400;
        }

        .input-group {
            text-align: left;
            margin-bottom: 30px;
        }

        .input-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(160, 190, 110, 0.6);
            margin-bottom: 10px;
        }

        .time-input {
            width: 100%;
            padding: 17px 20px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            border: 1px solid rgba(120, 150, 80, 0.25);
            border-radius: 16px;
            background: rgba(15, 18, 10, 0.7);
            color: #d8e0c0;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .time-input::placeholder {
            color: rgba(150, 180, 110, 0.35);
            font-style: italic;
        }

        .time-input:focus {
            border-color: rgba(160, 200, 80, 0.5);
            background: rgba(18, 22, 12, 0.9);
            box-shadow: 0 0 30px rgba(120, 170, 40, 0.08);
        }

        .hint {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .hint span {
            font-size: 0.7rem;
            color: rgba(150, 180, 110, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px 12px;
            border: 1px solid rgba(120, 150, 80, 0.2);
            border-radius: 20px;
            font-weight: 300;
            background: rgba(40, 60, 20, 0.2);
        }

        .hint span:hover {
            color: rgba(200, 230, 140, 0.9);
            border-color: rgba(160, 200, 80, 0.5);
            background: rgba(60, 100, 30, 0.3);
        }

        .confirm-btn {
            width: 100%;
            padding: 17px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, rgba(100, 150, 40, 0.8), rgba(60, 100, 25, 0.7));
            color: #e8f0d0;
            border: 1px solid rgba(140, 190, 60, 0.3);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .confirm-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: left 0.6s;
        }

        .confirm-btn:hover:not(:disabled)::after {
            left: 100%;
        }

        .confirm-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(120, 180, 50, 0.9), rgba(80, 130, 30, 0.8));
            box-shadow: 0 8px 35px rgba(100, 160, 30, 0.25);
            transform: translateY(-2px);
        }

        .confirm-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .confirm-btn:disabled {
            background: rgba(30, 40, 18, 0.6);
            border-color: rgba(80, 110, 40, 0.2);
            color: rgba(130, 160, 90, 0.4);
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 36px;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(150, 180, 110, 0.3);
        }
    </style>
</head>
<body>
    <div class="texture"></div>
    <div class="leaves-container" id="leavesContainer"></div>

    <div class="card">
        <span class="icon">🌿</span>
        <h1>Приглашение<br>на прогулку</h1>
        <p class="subtitle">Выберите удобное время среди природы</p>

        <div class="input-group">
            <label class="input-label" for="timeInput">Когда вам удобно?</label>
            <input type="text" class="time-input" id="timeInput" placeholder="Завтра в 18:00" autocomplete="off">
            <div class="hint">
                <span onclick="setTime('Сегодня вечером')">Сегодня вечером</span>
                <span onclick="setTime('В субботу днём')">В субботу днём</span>
                <span onclick="setTime('Завтра в 17:30')">Завтра в 17:30</span>
            </div>
        </div>

        <button class="confirm-btn" id="confirmBtn" disabled>Подтвердить</button>
        <div class="footer-text">🌱 Осень 2024</div>
    </div>

    <script>
        // Листья
        const leavesContainer = document.getElementById('leavesContainer');
        const leafEmojis = ['🍃', '🌿', '🍂', '🍁', '🌱', '🪴'];

        for (let i = 0; i < 25; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf-particle';
            leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
            leaf.style.left = Math.random() * 100 + '%';
            leaf.style.setProperty('--dur', (Math.random() * 12 + 8) + 's');
            leaf.style.setProperty('--delay', Math.random() * 10 + 's');
            leaf.style.setProperty('--drift', (Math.random() * 160 - 80) + 'px');
            leaf.style.fontSize = (Math.random() * 16 + 12) + 'px';
            leavesContainer.appendChild(leaf);
        }

        const input = document.getElementById('timeInput');
        const btn = document.getElementById('confirmBtn');

        function setTime(value) {
            input.value = value;
            btn.disabled = false;
            input.focus();
        }

        input.addEventListener('input', () => {
            btn.disabled = input.value.trim().length === 0;
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !btn.disabled) {
                e.preventDefault();
                go();
            }
        });

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            if (!btn.disabled) go();
        });

        function go() {
            window.location.href = 'meeting-walk.html?time=' + encodeURIComponent(input.value.trim());
        }

        window.addEventListener('load', () => {
            setTimeout(() => input.focus(), 400);
        });
    </script>
</body>
</html>
