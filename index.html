<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        :root {
            --orange: #ff8c00;
            --orange-light: #ffb366;
            --orange-red: #ff6347;
            --card-bg: rgba(25, 25, 45, 0.9);
            --input-bg: rgba(40, 40, 65, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
            background: #0a0a1a;
            overflow: hidden;
        }

        /* Анимированный градиентный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(45deg, #1a0033, #0d0033, #1a0a3e, #0d1a3e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Пульсирующие круги на фоне */
        .bg-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 140, 0, 0.2);
            animation: pulse-ring 4s ease-out infinite;
            opacity: 0;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Падающие листья */
        .leaves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .leaf {
            position: absolute;
            font-size: 24px;
            animation: leafFall var(--fall-duration) linear infinite;
            animation-delay: var(--fall-delay);
            opacity: 0.8;
        }

        @keyframes leafFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(110vh) rotate(var(--rotation)) translateX(var(--drift));
                opacity: 0;
            }
        }

        .container {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px 25px;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 
                0 0 30px rgba(255, 140, 0, 0.2),
                0 0 60px rgba(255, 100, 0, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 0 50px rgba(255, 140, 0, 0.4),
                0 0 100px rgba(255, 100, 0, 0.2),
                0 30px 80px rgba(0, 0, 0, 0.6);
        }

        /* Светящийся ободок */
        .glow-border {
            position: absolute;
            inset: -3px;
            border-radius: 33px;
            padding: 3px;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 140, 0, 0.5) 90deg,
                rgba(255, 100, 0, 0.5) 180deg,
                rgba(255, 140, 0, 0.5) 270deg,
                transparent 360deg
            );
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spinGlow 6s linear infinite;
            pointer-events: none;
        }

        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .icon-wrapper {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .icon {
            font-size: 60px;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 140, 0, 0.8));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.1); }
        }

        /* Свечение вокруг иконки */
        .icon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.4), transparent 70%);
            border-radius: 50%;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
        }

        h1 {
            color: #ff8c00;
            text-align: center;
            font-size: 2em;
            margin-bottom: 8px;
            text-shadow: 
                0 0 10px rgba(255, 140, 0, 0.8),
                0 0 30px rgba(255, 140, 0, 0.4),
                0 0 60px rgba(255, 100, 0, 0.2);
            font-weight: 800;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #ffb366;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 30px;
            opacity: 0.9;
            font-weight: 300;
        }

        .input-group {
            margin: 30px 0;
            position: relative;
        }

        .input-label {
            color: #ffb366;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: block;
            text-align: center;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .time-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.1em;
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid rgba(255, 140, 0, 0.3);
            border-radius: 20px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .time-input:focus {
            border-color: #ff8c00;
            box-shadow: 
                0 0 30px rgba(255, 140, 0, 0.4),
                inset 0 2px 10px rgba(0, 0, 0, 0.3);
            transform: scale(1.02);
            background: rgba(30, 30, 60, 0.9);
        }

        .time-input::placeholder {
            color: rgba(255, 179, 102, 0.4);
        }

        /* Иконка в инпуте */
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
            animation: pulse-icon 2s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .examples {
            color: #ffb366;
            font-size: 0.85em;
            margin-top: 12px;
            opacity: 0.6;
            text-align: center;
            line-height: 1.5;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ff8c00, #ff4500);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            font-weight: 700;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 30px rgba(255, 69, 0, 0.4),
                0 0 60px rgba(255, 140, 0, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .confirm-btn:not(:disabled) {
            animation: btnGlow 2s ease-in-out infinite;
        }

        @keyframes btnGlow {
            0%, 100% { 
                box-shadow: 0 8px 30px rgba(255, 69, 0, 0.4), 0 0 60px rgba(255, 140, 0, 0.2);
            }
            50% { 
                box-shadow: 0 8px 40px rgba(255, 69, 0, 0.7), 0 0 80px rgba(255, 140, 0, 0.4);
            }
        }

        /* Эффект волны при наведении */
        .confirm-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .confirm-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .confirm-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .confirm-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            animation: none;
            box-shadow: none;
            filter: grayscale(50%);
        }

        .decoration {
            text-align: center;
            font-size: 24px;
            margin-top: 25px;
            opacity: 0.5;
            letter-spacing: 10px;
        }

        .decoration span {
            display: inline-block;
            animation: floatDecor 3s ease-in-out infinite;
        }

        .decoration span:nth-child(2) {
            animation-delay: 0.5s;
        }
        .decoration span:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes floatDecor {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="bg-circles" id="bgCircles"></div>
    <div class="leaves" id="leaves"></div>

    <div class="container">
        <div class="glow-border"></div>
        <div class="content">
            <div class="icon-wrapper">
                <div class="icon-glow"></div>
                <div class="icon">🌳</div>
            </div>
            <h1>Приглашаю на прогулку!</h1>
            <p class="subtitle">Выбери удобное время ✨</p>
            
            <div class="input-group">
                <label class="input-label" for="timeInput">🕐 Когда тебе удобно?</label>
                <div class="input-wrapper">
                    <span class="input-icon">⏰</span>
                    <input 
                        type="text" 
                        class="time-input" 
                        id="timeInput" 
                        placeholder="Например: Завтра в 18:00"
                        autocomplete="off"
                        style="padding-left: 45px;"
                    >
                </div>
                <div class="examples">
                    💡 "Сегодня вечером" • "В субботу днём" • "Завтра в 17:30"
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled>
                ✨ Подтвердить время ✨
            </button>

            <div class="decoration">
                <span>🌿</span>
                <span>☀️</span>
                <span>🌿</span>
            </div>
        </div>
    </div>

    <script>
        // Пульсирующие круги
        function createCircles() {
            const container = document.getElementById('bgCircles');
            for (let i = 0; i < 5; i++) {
                const circle = document.createElement('div');
                circle.className = 'bg-circle';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.width = (Math.random() * 200 + 100) + 'px';
                circle.style.height = circle.style.width;
                circle.style.animationDelay = (i * 0.8) + 's';
                container.appendChild(circle);
            }
        }

        // Падающие листья
        function createLeaves() {
            const leaves = ['🍂', '🍁', '🌿', '🍃', '✨', '💫'];
            const container = document.getElementById('leaves');
            
            for (let i = 0; i < 15; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.textContent = leaves[Math.floor(Math.random() * leaves.length)];
                leaf.style.left = Math.random() * 100 + '%';
                leaf.style.setProperty('--fall-duration', (Math.random() * 10 + 10) + 's');
                leaf.style.setProperty('--fall-delay', Math.random() * 10 + 's');
                leaf.style.setProperty('--rotation', (Math.random() * 720 - 360) + 'deg');
                leaf.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
                container.appendChild(leaf);
            }
        }

        createCircles();
        createLeaves();

        // Логика формы
        (function() {
            const timeInput = document.getElementById('timeInput');
            const confirmBtn = document.getElementById('confirmBtn');

            function updateButtonState() {
                const hasValue = timeInput.value.trim().length > 0;
                confirmBtn.disabled = !hasValue;
            }

            function goToNextPage() {
                const selectedTime = timeInput.value.trim();
                if (!selectedTime) return;
                const encodedTime = encodeURIComponent(selectedTime);
                window.location.href = `meeting-walk.html?time=${encodedTime}`;
            }

            timeInput.addEventListener('input', updateButtonState);
            timeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !confirmBtn.disabled) {
                    e.preventDefault();
                    goToNextPage();
                }
            });
            confirmBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!confirmBtn.disabled) goToNextPage();
            });

            window.addEventListener('load', () => {
                setTimeout(() => timeInput.focus(), 500);
            });
        })();
    </script>
</body>
</html>
