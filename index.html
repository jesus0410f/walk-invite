<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-accent: #0f3460;
            --orange: #ff8c00;
            --orange-light: #ffb366;
            --orange-red: #ff6347;
            --card-bg: rgba(25, 25, 45, 0.95);
            --input-bg: rgba(40, 40, 65, 0.9);
            --input-focus-bg: rgba(50, 50, 75, 0.95);
            --shadow-glow: 0 0 80px rgba(255, 140, 0, 0.2);
            --shadow-warm: 0 20px 50px rgba(0, 0, 0, 0.4);
            --border-color: rgba(255, 140, 0, 0.5);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary), var(--bg-accent));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-warm), var(--shadow-glow), 0 0 120px rgba(255, 100, 50, 0.15);
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: 
                radial-gradient(circle, rgba(255,140,0,0.08) 0%, transparent 60%),
                radial-gradient(circle at 70% 30%, rgba(255,100,50,0.06) 0%, transparent 60%);
            animation: rotate 25s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255,140,0,0.6));
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            color: var(--orange);
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 0 0 25px rgba(255,140,0,0.5);
            line-height: 1.2;
        }

        .subtitle {
            color: var(--orange-light);
            text-align: center;
            font-size: 1em;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .input-group {
            margin: 25px 0;
        }

        .input-label {
            color: var(--orange-light);
            font-size: 1em;
            margin-bottom: 12px;
            display: block;
            text-align: center;
        }

        .time-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1em;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: white;
            outline: none;
            transition: all var(--transition);
            text-align: center;
            -webkit-appearance: none;
            font-family: inherit;
        }

        .time-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 25px rgba(255,140,0,0.3);
            background: var(--input-focus-bg);
        }

        .time-input::placeholder {
            color: rgba(255, 179, 102, 0.5);
            font-size: 0.95em;
        }

        .examples {
            color: var(--orange-light);
            font-size: 0.8em;
            margin-top: 10px;
            opacity: 0.7;
            text-align: center;
            line-height: 1.4;
        }

        .confirm-btn {
            background: linear-gradient(135deg, var(--orange), var(--orange-red));
            color: white;
            border: none;
            padding: 15px;
            border-radius: var(--radius-sm);
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            transition: all var(--transition);
            margin-top: 20px;
            font-weight: 600;
            -webkit-appearance: none;
            box-shadow: 0 5px 25px rgba(255,140,0,0.3);
            font-family: inherit;
        }

        .confirm-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .confirm-btn:disabled {
            opacity: 0.4;
            box-shadow: none;
            cursor: not-allowed;
        }

        .decoration {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            opacity: 0.6;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="icon">🌳</div>
            <h1>Приглашаю на прогулку!</h1>
            <p class="subtitle">Выбери удобное время:</p>
            
            <div class="input-group">
                <label class="input-label" for="timeInput">🕐 Когда тебе удобно?</label>
                <input 
                    type="text" 
                    class="time-input" 
                    id="timeInput" 
                    placeholder="Например: Завтра в 18:00"
                    autocomplete="off"
                    inputmode="text"
                    aria-label="Введите удобное время для прогулки"
                >
                <div class="examples">
                    💡 Например: "Сегодня вечером", "В субботу после обеда", "Завтра в 17:30"
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled aria-label="Подтвердить выбранное время">
                Подтвердить время
            </button>

            <div class="decoration">🌿 ☀️ 🌿</div>
        </div>
    </div>

    <script>
        (function() {
            const timeInput = document.getElementById('timeInput');
            const confirmBtn = document.getElementById('confirmBtn');

            function updateButtonState() {
                const hasValue = timeInput.value.trim().length > 0;
                confirmBtn.disabled = !hasValue;
            }

            function goToNextPage() {
                const selectedTime = timeInput.value.trim();
                if (!selectedTime) return;
                
                const encodedTime = encodeURIComponent(selectedTime);
                window.location.href = `meeting-walk.html?time=${encodedTime}`;
            }

            // Обработчик ввода
            timeInput.addEventListener('input', updateButtonState);

            // Обработчик клавиш
            timeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !confirmBtn.disabled) {
                    e.preventDefault();
                    goToNextPage();
                }
            });

            // Обработчик клика
            confirmBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!confirmBtn.disabled) {
                    goToNextPage();
                }
            });

            // Автофокус при загрузке
            window.addEventListener('load', () => {
                setTimeout(() => timeInput.focus(), 300);
            });
        })();
    </script>
</body>
</html>
