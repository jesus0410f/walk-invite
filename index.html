<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на прогулку</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(60, 40, 20, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(40, 30, 20, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(20, 15, 10, 0.4) 0%, transparent 60%);
            z-index: 0;
            animation: bgShift 20s ease infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(1%, -1%); }
            66% { transform: translate(-1%, 1%); }
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 1px;
            height: 1px;
            background: rgba(200, 160, 100, 0.6);
            border-radius: 50%;
            animation: floatUp var(--dur) linear infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(20, 18, 15, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 50px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(180, 150, 100, 0.15);
            box-shadow: 
                0 0 60px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(160, 120, 60, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 29px;
            padding: 1px;
            background: linear-gradient(135deg, 
                rgba(200, 160, 100, 0.3), 
                transparent 40%, 
                transparent 60%, 
                rgba(200, 160, 100, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 24px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(200, 150, 80, 0.3));
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 2.4rem;
            color: #e8dcc8;
            margin-bottom: 8px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: rgba(200, 180, 150, 0.7);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .input-group {
            text-align: left;
            margin-bottom: 28px;
        }

        .input-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(200, 170, 130, 0.6);
            margin-bottom: 10px;
        }

        .time-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            border: 1px solid rgba(180, 150, 100, 0.2);
            border-radius: 14px;
            background: rgba(15, 12, 8, 0.6);
            color: #e8dcc8;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .time-input::placeholder {
            color: rgba(180, 150, 120, 0.4);
            font-style: italic;
        }

        .time-input:focus {
            border-color: rgba(200, 160, 100, 0.5);
            background: rgba(20, 15, 10, 0.8);
            box-shadow: 0 0 30px rgba(180, 140, 80, 0.08);
        }

        .hint {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .hint span {
            font-size: 0.7rem;
            color: rgba(180, 150, 120, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 10px;
            border: 1px solid rgba(180, 150, 100, 0.15);
            border-radius: 20px;
            font-weight: 300;
        }

        .hint span:hover {
            color: rgba(220, 190, 140, 0.9);
            border-color: rgba(200, 160, 100, 0.4);
            background: rgba(200, 160, 100, 0.05);
        }

        .confirm-btn {
            width: 100%;
            padding: 17px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, rgba(180, 140, 90, 0.8), rgba(140, 100, 50, 0.6));
            color: #f5efe0;
            border: 1px solid rgba(200, 160, 100, 0.3);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .confirm-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .confirm-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .confirm-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(200, 160, 100, 0.9), rgba(160, 120, 60, 0.7));
            box-shadow: 0 8px 30px rgba(180, 140, 80, 0.2);
            transform: translateY(-2px);
        }

        .confirm-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .confirm-btn:disabled {
            background: rgba(40, 35, 28, 0.6);
            border-color: rgba(100, 80, 50, 0.2);
            color: rgba(150, 130, 100, 0.4);
            cursor: not-allowed;
            letter-spacing: 3px;
        }

        .footer-text {
            margin-top: 32px;
            font-size: 0.65rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(180, 150, 120, 0.3);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="card">
        <span class="icon">🍂</span>
        <h1>Приглашение<br>на прогулку</h1>
        <p class="subtitle">Выберите удобное время</p>
        
        <div class="input-group">
            <label class="input-label" for="timeInput">Когда вам удобно?</label>
            <input 
                type="text" 
                class="time-input" 
                id="timeInput" 
                placeholder="Завтра в 18:00"
                autocomplete="off"
            >
            <div class="hint">
                <span onclick="setTime('Сегодня вечером')">Сегодня вечером</span>
                <span onclick="setTime('В субботу днём')">В субботу днём</span>
                <span onclick="setTime('Завтра в 17:30')">Завтра в 17:30</span>
            </div>
        </div>

        <button class="confirm-btn" id="confirmBtn" disabled>Подтвердить</button>
        <div class="footer-text">Осень 2024</div>
    </div>

    <script>
        // Партиклы
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.setProperty('--dur', (Math.random() * 10 + 8) + 's');
            p.style.setProperty('--delay', Math.random() * 8 + 's');
            particlesContainer.appendChild(p);
        }

        const input = document.getElementById('timeInput');
        const btn = document.getElementById('confirmBtn');

        function setTime(value) {
            input.value = value;
            btn.disabled = false;
            input.focus();
        }

        input.addEventListener('input', () => {
            btn.disabled = input.value.trim().length === 0;
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !btn.disabled) {
                e.preventDefault();
                go();
            }
        });

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            if (!btn.disabled) go();
        });

        function go() {
            window.location.href = 'meeting-walk.html?time=' + encodeURIComponent(input.value.trim());
        }

        window.addEventListener('load', () => {
            setTimeout(() => input.focus(), 400);
        });
    </script>
</body>
</html>
